<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO アプリ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 600px; }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        /* Input */
        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .input-area input {
            flex: 1;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
        }

        .input-area input:focus { border-color: #667eea; }

        .add-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 11px 22px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .add-btn:hover { opacity: 0.88; }
        .add-btn:active { transform: scale(0.96); }

        /* Filters */
        .filters {
            display: flex;
            padding: 10px 18px;
            gap: 6px;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
        }

        .filter-btn {
            padding: 5px 14px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            color: #777;
            transition: all 0.18s;
        }

        .filter-btn:hover { color: #667eea; border-color: #667eea; }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* List */
        .todo-list {
            list-style: none;
            max-height: 420px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }

        .todo-list::-webkit-scrollbar { width: 4px; }
        .todo-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
            animation: slideIn 0.18s ease;
            transition: background 0.12s;
        }

        .todo-item:hover { background: #fafafa; }
        .todo-item:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Checkbox */
        .todo-check {
            width: 22px;
            height: 22px;
            border: 2px solid #ddd;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.18s;
            user-select: none;
        }

        .todo-check:hover { border-color: #667eea; }

        .todo-check.done {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
        }

        .todo-check.done::after {
            content: '✓';
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Text */
        .todo-text {
            flex: 1;
            font-size: 0.93rem;
            color: #333;
            word-break: break-word;
            cursor: text;
            padding: 2px 5px;
            border-radius: 4px;
            transition: background 0.12s;
            line-height: 1.5;
        }

        .todo-text:hover { background: #f0f0f0; }

        .todo-text.done {
            text-decoration: line-through;
            color: #bbb;
        }

        .edit-input {
            flex: 1;
            border: 1.5px solid #667eea;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.93rem;
            outline: none;
            font-family: inherit;
            color: #333;
        }

        /* Delete */
        .del-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 1.15rem;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .todo-item:hover .del-btn { opacity: 1; }
        .del-btn:hover { background: #fee2e2; }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: #c0c0c0;
        }

        .empty .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .empty p { font-size: 0.9rem; }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            background: #fafafa;
            border-top: 1px solid #f0f0f0;
        }

        .count { font-size: 0.82rem; color: #999; }

        .clear-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 0.82rem;
            padding: 4px 9px;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .clear-btn:hover { background: #fee2e2; }
        .clear-btn:disabled { opacity: 0.35; cursor: default; }
        .clear-btn:disabled:hover { background: none; }

        .hint {
            font-size: 0.75rem;
            color: #ccc;
            text-align: center;
            padding: 0 0 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✅ TODO</h1>
    <div class="card">
        <div class="input-area">
            <input id="inp" type="text" placeholder="新しいタスクを入力... (Enterで追加)" autocomplete="off" />
            <button class="add-btn" id="addBtn">追加</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-f="all">すべて</button>
            <button class="filter-btn" data-f="active">未完了</button>
            <button class="filter-btn" data-f="done">完了済み</button>
        </div>
        <ul class="todo-list" id="list"></ul>
        <div class="footer">
            <span class="count" id="count"></span>
            <button class="clear-btn" id="clearBtn">完了済みを削除</button>
        </div>
        <p class="hint">ダブルクリックでタスクを編集</p>
    </div>
</div>

<script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const inp = document.getElementById('inp');
    const list = document.getElementById('list');
    const countEl = document.getElementById('count');
    const clearBtn = document.getElementById('clearBtn');

    function save() {
        localStorage.setItem('todos', JSON.stringify(todos));
    }

    function escape(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
        const visible = todos.filter(t => {
            if (filter === 'active') return !t.done;
            if (filter === 'done')   return  t.done;
            return true;
        });

        if (visible.length === 0) {
            const msgs = {
                all:    ['📝', 'タスクを追加してください'],
                active: ['🎉', '未完了のタスクはありません'],
                done:   ['✨', '完了済みのタスクはありません'],
            };
            const [icon, msg] = msgs[filter];
            list.innerHTML = `<div class="empty"><div class="icon">${icon}</div><p>${msg}</p></div>`;
        } else {
            list.innerHTML = visible.map(t => `
                <li class="todo-item" data-id="${t.id}">
                    <div class="todo-check ${t.done ? 'done' : ''}"></div>
                    <span class="todo-text ${t.done ? 'done' : ''}">${escape(t.text)}</span>
                    <button class="del-btn" title="削除">×</button>
                </li>
            `).join('');
        }

        const active = todos.filter(t => !t.done).length;
        countEl.textContent = `${active} 件残り`;
        clearBtn.disabled = !todos.some(t => t.done);
    }

    function addTodo() {
        const text = inp.value.trim();
        if (!text) return;
        todos.unshift({ id: Date.now(), text, done: false });
        inp.value = '';
        save();
        render();
    }

    // Event delegation on list
    list.addEventListener('click', e => {
        const item = e.target.closest('.todo-item');
        if (!item) return;
        const id = Number(item.dataset.id);

        if (e.target.classList.contains('todo-check')) {
            const t = todos.find(t => t.id === id);
            if (t) { t.done = !t.done; save(); render(); }
        }
        if (e.target.classList.contains('del-btn')) {
            todos = todos.filter(t => t.id !== id);
            save(); render();
        }
    });

    // Inline edit on double-click
    list.addEventListener('dblclick', e => {
        const span = e.target.closest('.todo-text');
        if (!span) return;
        const item = span.closest('.todo-item');
        const id = Number(item.dataset.id);
        const t = todos.find(t => t.id === id);
        if (!t || t.done) return;

        const ed = document.createElement('input');
        ed.type = 'text';
        ed.className = 'edit-input';
        ed.value = t.text;
        span.replaceWith(ed);
        ed.focus();
        ed.select();

        const commit = () => {
            const v = ed.value.trim();
            if (v) t.text = v;
            save(); render();
        };

        ed.addEventListener('blur', commit);
        ed.addEventListener('keydown', ev => {
            if (ev.key === 'Enter')  commit();
            if (ev.key === 'Escape') render();
        });
    });

    document.getElementById('addBtn').addEventListener('click', addTodo);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            filter = btn.dataset.f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        });
    });

    clearBtn.addEventListener('click', () => {
        todos = todos.filter(t => !t.done);
        save(); render();
    });

    render();
</script>
</body>
</html>
